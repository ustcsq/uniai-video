# conda env create -f environment.yml
# conda activate uniai-video-backend
# 若改 pip 依赖，请同步 backend/Dockerfile 里的 pip install 版本约束
name: uniai-video-backend
channels:
  - conda-forge
dependencies:
  - python=3.12.*
  - pip
  - pip:
      - fastapi>=0.115.0
      - "uvicorn[standard]>=0.32.0"
      - pydantic-settings>=2.6.0
      - sqlalchemy[asyncio]>=2.0.36
      - asyncpg>=0.30.0
      - aiosqlite>=0.20.0
      - alembic>=1.14.0
      - redis>=5.0.0
      - pytest>=8.0.0
      - pytest-asyncio>=0.24.0
      - httpx>=0.27.0
      - PyJWT>=2.8.0
